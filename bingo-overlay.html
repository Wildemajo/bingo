<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bingo Overlay</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@500&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Syne', sans-serif;
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
  }

  /* Themes */
  .theme-purple { --c1: #a78bfa; --c2: #7c3aed; --c3: rgba(167,139,250,0.12); --c4: rgba(167,139,250,0.35); --shadow: rgba(124,58,237,0.6); }
  .theme-green  { --c1: #34d399; --c2: #059669; --c3: rgba(52,211,153,0.12); --c4: rgba(52,211,153,0.35); --shadow: rgba(5,150,105,0.6); }
  .theme-orange { --c1: #fb923c; --c2: #ea580c; --c3: rgba(251,146,60,0.12); --c4: rgba(251,146,60,0.35); --shadow: rgba(234,88,12,0.6); }
  .theme-blue   { --c1: #60a5fa; --c2: #2563eb; --c3: rgba(96,165,250,0.12); --c4: rgba(96,165,250,0.35); --shadow: rgba(37,99,235,0.6); }
  .theme-pink   { --c1: #f472b6; --c2: #db2777; --c3: rgba(244,114,182,0.12); --c4: rgba(244,114,182,0.35); --shadow: rgba(219,39,119,0.6); }

  .bingo-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    padding: 24px;
    background: rgba(10,10,15,0.85);
    border: 1px solid var(--c4, rgba(167,139,250,0.35));
    border-radius: 20px;
    backdrop-filter: blur(12px);
    box-shadow: 0 0 40px var(--shadow, rgba(124,58,237,0.4)), inset 0 0 0 1px rgba(255,255,255,0.05);
    min-width: 300px;
    max-width: 700px;
    width: fit-content;
  }

  .bingo-title {
    font-size: 1.4rem;
    font-weight: 800;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--c1, #a78bfa);
    text-shadow: 0 0 20px var(--shadow, rgba(167,139,250,0.7));
  }

  .bingo-grid {
    display: grid;
    gap: 6px;
  }

  .bingo-cell {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 8px;
    font-size: 0.78rem;
    font-weight: 700;
    color: rgba(255,255,255,0.7);
    min-width: 90px;
    min-height: 64px;
    line-height: 1.3;
    transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative;
    overflow: hidden;
  }

  .bingo-cell::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--c3, rgba(167,139,250,0.12));
    opacity: 0;
    transition: opacity 0.4s;
  }

  .bingo-cell.marked {
    border-color: var(--c4, rgba(167,139,250,0.5));
    background: var(--c3, rgba(167,139,250,0.12));
    color: var(--c1, #a78bfa);
    box-shadow: 0 0 16px var(--shadow, rgba(124,58,237,0.3)), inset 0 0 0 1px var(--c4, rgba(167,139,250,0.3));
    transform: scale(1.04);
  }

  .bingo-cell.marked::before { opacity: 1; }

  .bingo-cell.free {
    border-color: rgba(251,191,36,0.4);
    background: rgba(251,191,36,0.08);
    color: #fbbf24;
    font-size: 1rem;
    letter-spacing: 2px;
    box-shadow: 0 0 20px rgba(251,191,36,0.2);
  }

  .bingo-cell.win-line {
    animation: pulse-win 0.8s ease-in-out infinite alternate;
  }

  @keyframes pulse-win {
    from { box-shadow: 0 0 16px var(--shadow, rgba(124,58,237,0.4)); }
    to   { box-shadow: 0 0 32px var(--shadow, rgba(124,58,237,0.8)), 0 0 60px var(--shadow, rgba(124,58,237,0.3)); }
  }

  .check-icon {
    position: absolute;
    top: 4px; right: 6px;
    font-size: 10px;
    color: var(--c1, #a78bfa);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .bingo-cell.marked .check-icon { opacity: 1; }

  .bingo-footer {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: rgba(255,255,255,0.2);
    letter-spacing: 1px;
  }

  .win-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    align-items: center;
    justify-content: center;
    z-index: 100;
  }
  .win-overlay.show { display: flex; }
  .win-box {
    text-align: center;
    animation: pop-in 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes pop-in {
    from { transform: scale(0.5); opacity: 0; }
    to   { transform: scale(1); opacity: 1; }
  }
  .win-text {
    font-size: 5rem;
    font-weight: 800;
    color: #fbbf24;
    letter-spacing: 8px;
    text-shadow: 0 0 40px rgba(251,191,36,0.8), 0 0 80px rgba(251,191,36,0.4);
    animation: pulse-win-text 0.6s ease-in-out infinite alternate;
  }
  @keyframes pulse-win-text {
    from { text-shadow: 0 0 40px rgba(251,191,36,0.8); }
    to   { text-shadow: 0 0 80px rgba(251,191,36,1), 0 0 120px rgba(251,191,36,0.6); }
  }
  .win-sub { font-size: 1.2rem; color: rgba(251,191,36,0.7); letter-spacing: 3px; margin-top: 0.5rem; }

  .cell-span {
    position: relative;
    z-index: 1;
  }
</style>
</head>
<body>

<div id="winOverlay" class="win-overlay">
  <div class="win-box">
    <div class="win-text">BINGO!</div>
    <div class="win-sub" id="winSubtext">🏆</div>
  </div>
</div>

<div id="bingoWrapper" class="bingo-wrapper theme-purple">
  <div class="bingo-title" id="bingoTitle">BINGO</div>
  <div class="bingo-grid" id="bingoGrid">
    <div style="color:rgba(255,255,255,0.3); padding:2rem; font-family:'DM Mono',monospace; font-size:0.8rem;">
      Warte auf Admin-Daten…
    </div>
  </div>
  <div class="bingo-footer">STREAMBINGO · OBS OVERLAY</div>
</div>

<script>
  let lastMarked = null;
  let lastWin = false;
  let lastTitle = '';

  function getWinLines(marked, gridSize) {
    const n = gridSize;
    const wins = [];
    for (let r = 0; r < n; r++) {
      const row = [];
      for (let c = 0; c < n; c++) row.push(r * n + c);
      if (row.every(i => marked[i])) wins.push(row);
    }
    for (let c = 0; c < n; c++) {
      const col = [];
      for (let r = 0; r < n; r++) col.push(r * n + c);
      if (col.every(i => marked[i])) wins.push(col);
    }
    const d1 = [], d2 = [];
    for (let i = 0; i < n; i++) { d1.push(i * n + i); d2.push(i * n + (n - 1 - i)); }
    if (d1.every(i => marked[i])) wins.push(d1);
    if (d2.every(i => marked[i])) wins.push(d2);
    return wins;
  }

  function render(state) {
    const { gridSize, cells, marked, title, theme, freeMiddle } = state;
    const mid = gridSize % 2 !== 0 ? Math.floor((gridSize * gridSize) / 2) : -1;
    const n = gridSize;

    document.getElementById('bingoTitle').textContent = (title || 'BINGO').toUpperCase();
    document.getElementById('bingoWrapper').className = 'bingo-wrapper theme-' + (theme || 'purple');

    const wins = getWinLines(marked, n);
    const winCells = new Set(wins.flat());
    const hasWin = wins.length > 0;

    if (hasWin !== lastWin) {
      const overlay = document.getElementById('winOverlay');
      if (hasWin) {
        overlay.classList.add('show');
        document.getElementById('winSubtext').textContent = '🏆 ' + wins.length + (wins.length === 1 ? ' Linie!' : ' Linien!');
        setTimeout(() => overlay.classList.remove('show'), 4000);
      }
      lastWin = hasWin;
    }

    const grid = document.getElementById('bingoGrid');
    grid.style.gridTemplateColumns = `repeat(${n}, 1fr)`;
    grid.innerHTML = '';

    cells.forEach((val, i) => {
      const isMiddle = freeMiddle && i === mid && n % 2 !== 0;
      const isMarked = marked[i];
      const isWin = winCells.has(i);

      const cell = document.createElement('div');
      let cls = 'bingo-cell';
      if (isMiddle) cls += ' free';
      else if (isMarked) cls += ' marked';
      if (isWin) cls += ' win-line';

      cell.className = cls;

      const span = document.createElement('span');
      span.className = 'cell-span';
      span.textContent = isMiddle ? 'FREE' : (val || '');
      cell.appendChild(span);

      if (!isMiddle) {
        const chk = document.createElement('span');
        chk.className = 'check-icon';
        chk.textContent = '✓';
        cell.appendChild(chk);
      }

      grid.appendChild(cell);
    });
  }

  function poll() {
    try {
      const raw = localStorage.getItem('bingo_state');
      if (!raw) return;
      const state = JSON.parse(raw);
      const sig = JSON.stringify(state.marked) + state.title + state.theme;
      if (sig !== lastMarked) {
        lastMarked = sig;
        render(state);
      }
    } catch(e) {}
  }

  setInterval(poll, 500);
  poll();
</script>
</body>
</html>
