<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bingo Admin – Steuerzentrale</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.15);
    --accent: #a78bfa;
    --accent2: #7c3aed;
    --gold: #fbbf24;
    --green: #34d399;
    --red: #f87171;
    --text: #e2e8f0;
    --muted: #64748b;
    --font: 'Syne', sans-serif;
    --mono: 'DM Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 2.5rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .logo-icon {
    width: 40px; height: 40px;
    background: var(--accent2);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }

  h1 { font-size: 1.5rem; font-weight: 800; letter-spacing: -0.5px; }
  h1 span { color: var(--accent); }

  .badge {
    font-family: var(--mono);
    font-size: 0.7rem;
    background: rgba(167,139,250,0.15);
    color: var(--accent);
    border: 1px solid rgba(167,139,250,0.3);
    padding: 4px 10px;
    border-radius: 999px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .layout {
    display: grid;
    grid-template-columns: 320px 1fr;
    gap: 2rem;
    align-items: start;
  }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.5rem;
  }

  .panel-title {
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 1.25rem;
  }

  label {
    display: block;
    font-size: 0.85rem;
    color: var(--muted);
    margin-bottom: 0.4rem;
    font-weight: 600;
  }

  select, input[type="text"] {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 10px;
    color: var(--text);
    font-family: var(--font);
    font-size: 0.95rem;
    padding: 0.6rem 0.85rem;
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 1rem;
    appearance: none;
  }
  select:focus, input[type="text"]:focus {
    border-color: var(--accent);
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.65rem 1.25rem;
    border-radius: 10px;
    font-family: var(--font);
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    border: none;
  }
  .btn-primary {
    background: var(--accent2);
    color: #fff;
  }
  .btn-primary:hover { background: var(--accent); }
  .btn-secondary {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border2);
  }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
  .btn-danger {
    background: rgba(248,113,113,0.1);
    color: var(--red);
    border: 1px solid rgba(248,113,113,0.3);
  }
  .btn-danger:hover { background: rgba(248,113,113,0.2); }
  .btn-gold {
    background: rgba(251,191,36,0.1);
    color: var(--gold);
    border: 1px solid rgba(251,191,36,0.3);
  }
  .btn-gold:hover { background: rgba(251,191,36,0.2); }
  .btn:active { transform: scale(0.97); }

  .btn-row {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    margin-top: 1rem;
  }

  .grid-builder {
    display: grid;
    gap: 6px;
  }

  .grid-cell {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    position: relative;
    transition: border-color 0.2s;
  }
  .grid-cell:hover { border-color: var(--border2); }
  .grid-cell input {
    width: 100%;
    background: transparent;
    border: none;
    color: var(--text);
    font-family: var(--font);
    font-size: 0.8rem;
    padding: 0.6rem 0.75rem;
    margin: 0;
    text-align: center;
    resize: none;
    outline: none;
  }
  .grid-cell input::placeholder { color: var(--muted); font-size: 0.75rem; }
  .grid-cell.marked {
    border-color: var(--green);
    background: rgba(52,211,153,0.08);
  }
  .grid-cell.marked input { color: var(--green); }

  .cell-mark-btn {
    position: absolute;
    top: 3px; right: 3px;
    width: 18px; height: 18px;
    border-radius: 50%;
    border: none;
    background: rgba(255,255,255,0.05);
    color: var(--muted);
    font-size: 10px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    line-height: 1;
  }
  .grid-cell.marked .cell-mark-btn {
    background: var(--green);
    color: #000;
  }
  .cell-mark-btn:hover { background: var(--accent); color: #fff; }

  .obs-box {
    background: rgba(167,139,250,0.05);
    border: 1px solid rgba(167,139,250,0.2);
    border-radius: 12px;
    padding: 1rem 1.25rem;
    margin-top: 1.25rem;
  }
  .obs-label {
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 0.5rem;
  }
  .obs-url {
    font-family: var(--mono);
    font-size: 0.78rem;
    color: var(--text);
    word-break: break-all;
    background: var(--surface2);
    border-radius: 8px;
    padding: 0.5rem 0.75rem;
    margin-bottom: 0.5rem;
    border: 1px solid var(--border);
  }

  .status-row {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-top: 1rem;
    padding: 0.75rem 1rem;
    background: var(--surface2);
    border-radius: 10px;
    font-size: 0.85rem;
  }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    flex-shrink: 0;
  }

  .win-banner {
    display: none;
    align-items: center;
    gap: 0.75rem;
    padding: 0.85rem 1.25rem;
    background: rgba(251,191,36,0.1);
    border: 1px solid rgba(251,191,36,0.3);
    border-radius: 12px;
    margin-top: 1rem;
    font-weight: 700;
    color: var(--gold);
  }
  .win-banner.show { display: flex; }
  .win-trophy { font-size: 1.5rem; }

  .progress-bar-wrap {
    margin-top: 1rem;
    background: var(--surface2);
    border-radius: 999px;
    height: 6px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    border-radius: 999px;
    transition: width 0.4s ease;
  }
  .progress-label {
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: 0.4rem;
    display: flex; justify-content: space-between;
  }

  .separator { border: none; border-top: 1px solid var(--border); margin: 1.25rem 0; }

  @media (max-width: 900px) {
    .layout { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🎱</div>
    <div>
      <h1>Stream<span>Bingo</span></h1>
      <div style="font-size:0.72rem; color:var(--muted); font-family:var(--mono);">Admin-Steuerzentrale</div>
    </div>
  </div>
  <span class="badge">Admin</span>
</header>

<div class="layout">

  <!-- Linke Seite: Einstellungen -->
  <div>
    <div class="panel">
      <div class="panel-title">⚙️ Einstellungen</div>

      <label>Bingo-Titel</label>
      <input type="text" id="bingoTitle" value="Stream Bingo" placeholder="z.B. Gaming Bingo">

      <label>Rastergröße</label>
      <select id="gridSize">
        <option value="3">3 × 3</option>
        <option value="4" selected>4 × 4</option>
        <option value="5">5 × 5</option>
        <option value="6">6 × 6</option>
      </select>

      <label>Freies Mittelfeld</label>
      <select id="freeSpace">
        <option value="yes">Ja – "FREE" in der Mitte</option>
        <option value="no">Nein</option>
      </select>

      <label>Farbthema für OBS</label>
      <select id="colorTheme">
        <option value="purple">Lila / Violet</option>
        <option value="green">Grün / Neon</option>
        <option value="orange">Orange / Feuer</option>
        <option value="blue">Blau / Eis</option>
        <option value="pink">Pink / Rose</option>
      </select>

      <div class="btn-row">
        <button class="btn btn-primary" onclick="applySettings()">✓ Übernehmen & Neu aufbauen</button>
        <button class="btn btn-secondary" onclick="fillDemo()">🎲 Demo-Daten</button>
      </div>

      <hr class="separator">

      <div class="panel-title">🎮 Steuerung</div>
      <div class="btn-row">
        <button class="btn btn-gold" onclick="checkWin()">🏆 Gewinner prüfen</button>
        <button class="btn btn-danger" onclick="resetAll()">↺ Alles zurücksetzen</button>
        <button class="btn btn-secondary" onclick="clearMarks()">○ Markierungen löschen</button>
      </div>

      <div id="winBanner" class="win-banner">
        <span class="win-trophy">🏆</span>
        <div>
          <div>BINGO!</div>
          <div style="font-size:0.8rem; font-weight:400; color: rgba(251,191,36,0.7);" id="winDetail">–</div>
        </div>
      </div>

      <div class="progress-bar-wrap" style="margin-top:1.25rem;">
        <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
      </div>
      <div class="progress-label">
        <span id="progressText">0 von 0 markiert</span>
        <span id="progressPct">0%</span>
      </div>

      <hr class="separator">

      <div class="panel-title">📡 OBS Browser-Quelle</div>
      <div class="obs-box">
        <div class="obs-label">URL für deinen Kollegen</div>
        <div class="obs-url" id="obsUrl">–</div>
        <div class="btn-row" style="margin-top: 0.5rem;">
          <button class="btn btn-secondary" onclick="copyUrl()" style="font-size:0.8rem; padding: 0.5rem 0.9rem;">📋 Kopieren</button>
          <button class="btn btn-secondary" onclick="openOverlay()" style="font-size:0.8rem; padding: 0.5rem 0.9rem;">↗ Vorschau</button>
        </div>
      </div>

      <div class="status-row">
        <div class="dot"></div>
        <span>OBS-Overlay synchronisiert sich live über localStorage</span>
      </div>
    </div>
  </div>

  <!-- Rechte Seite: Grid -->
  <div class="panel">
    <div class="panel-title">✏️ Felder bearbeiten & markieren</div>
    <div class="grid-builder" id="gridBuilder"></div>
  </div>

</div>

<script>
  let gridSize = 4;
  let cells = [];
  let marked = [];
  let freeMiddle = true;

  function getMiddleIndex() {
    if (gridSize % 2 === 0) return -1;
    return Math.floor((gridSize * gridSize) / 2);
  }

  function applySettings() {
    gridSize = parseInt(document.getElementById('gridSize').value);
    freeMiddle = document.getElementById('freeSpace').value === 'yes';
    const total = gridSize * gridSize;
    cells = Array(total).fill('');
    marked = Array(total).fill(false);
    const mid = getMiddleIndex();
    if (freeMiddle && mid !== -1) {
      cells[mid] = 'FREE';
      marked[mid] = true;
    }
    renderGrid();
    saveState();
    updateProgress();
  }

  function renderGrid() {
    const builder = document.getElementById('gridBuilder');
    builder.style.gridTemplateColumns = `repeat(${gridSize}, 1fr)`;
    builder.innerHTML = '';
    const mid = getMiddleIndex();

    cells.forEach((val, i) => {
      const isMiddle = freeMiddle && i === mid && gridSize % 2 !== 0;
      const cell = document.createElement('div');
      cell.className = 'grid-cell' + (marked[i] ? ' marked' : '');
      cell.dataset.index = i;

      const inp = document.createElement('input');
      inp.type = 'text';
      inp.placeholder = isMiddle ? 'FREE' : `Feld ${i + 1}`;
      inp.value = val;
      if (isMiddle) inp.readOnly = true;
      inp.addEventListener('input', (e) => {
        cells[i] = e.target.value;
        saveState();
      });

      const btn = document.createElement('button');
      btn.className = 'cell-mark-btn';
      btn.textContent = marked[i] ? '✓' : '•';
      btn.title = 'Markieren / Abwählen';
      btn.addEventListener('click', () => toggleMark(i));

      cell.appendChild(inp);
      cell.appendChild(btn);
      builder.appendChild(cell);
    });
  }

  function toggleMark(i) {
    const mid = getMiddleIndex();
    if (freeMiddle && i === mid && gridSize % 2 !== 0) return;
    marked[i] = !marked[i];
    const cellEls = document.querySelectorAll('.grid-cell');
    const cell = cellEls[i];
    if (marked[i]) {
      cell.classList.add('marked');
      cell.querySelector('.cell-mark-btn').textContent = '✓';
    } else {
      cell.classList.remove('marked');
      cell.querySelector('.cell-mark-btn').textContent = '•';
    }
    saveState();
    updateProgress();
    checkWinSilent();
  }

  function updateProgress() {
    const total = gridSize * gridSize;
    const mid = getMiddleIndex();
    const ignoreFree = freeMiddle && mid !== -1 ? 1 : 0;
    const effective = total - ignoreFree;
    const count = marked.filter((v, i) => !(freeMiddle && i === mid && gridSize % 2 !== 0) && v).length;
    const pct = effective > 0 ? Math.round((count / effective) * 100) : 0;
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressText').textContent = `${count} von ${effective} markiert`;
    document.getElementById('progressPct').textContent = pct + '%';
  }

  function checkLines() {
    const n = gridSize;
    const wins = [];

    // Reihen
    for (let r = 0; r < n; r++) {
      const row = [];
      for (let c = 0; c < n; c++) row.push(r * n + c);
      if (row.every(i => marked[i])) wins.push('Reihe ' + (r + 1));
    }
    // Spalten
    for (let c = 0; c < n; c++) {
      const col = [];
      for (let r = 0; r < n; r++) col.push(r * n + c);
      if (col.every(i => marked[i])) wins.push('Spalte ' + (c + 1));
    }
    // Diagonalen
    const diag1 = [], diag2 = [];
    for (let i = 0; i < n; i++) {
      diag1.push(i * n + i);
      diag2.push(i * n + (n - 1 - i));
    }
    if (diag1.every(i => marked[i])) wins.push('Diagonale ↘');
    if (diag2.every(i => marked[i])) wins.push('Diagonale ↙');
    return wins;
  }

  function checkWin() {
    const wins = checkLines();
    const banner = document.getElementById('winBanner');
    if (wins.length > 0) {
      banner.classList.add('show');
      document.getElementById('winDetail').textContent = wins.join(' · ');
    } else {
      banner.classList.remove('show');
      alert('Noch kein BINGO! Weiter markieren 🎯');
    }
    saveState();
  }

  function checkWinSilent() {
    const wins = checkLines();
    const banner = document.getElementById('winBanner');
    if (wins.length > 0) {
      banner.classList.add('show');
      document.getElementById('winDetail').textContent = wins.join(' · ');
    } else {
      banner.classList.remove('show');
    }
    saveState();
  }

  function clearMarks() {
    const mid = getMiddleIndex();
    marked = Array(gridSize * gridSize).fill(false);
    if (freeMiddle && mid !== -1) marked[mid] = true;
    document.getElementById('winBanner').classList.remove('show');
    renderGrid();
    saveState();
    updateProgress();
  }

  function resetAll() {
    if (!confirm('Alles zurücksetzen? Alle Felder und Markierungen werden gelöscht.')) return;
    applySettings();
    document.getElementById('winBanner').classList.remove('show');
  }

  function fillDemo() {
    const demos = {
      3: ['Lag-Spike','Rage-Quit','Pentakill','Clutch-Play','GG','AFK Spieler','Teamkill','No-Scope','Stream-Crash'],
      4: ['Rage-Quit','10 Kill-Streak','Lag-Spike','GG EZ','AFK Spieler','Pentakill','No-Scope','Clutch-Play','Teamkill','Stream-Crash','Salty Chat','Griefer','Epic Fail','200 IQ Play','DC mitten im Spiel','Comeback from hell'],
      5: ['Rage-Quit','10 Kill-Streak','Lag-Spike','GG EZ','AFK Spieler','Pentakill','No-Scope','Clutch-Play','Teamkill','Stream-Crash','Salty Chat','Griefer','Epic Fail','200 IQ Play','DC','Bot Lane feeding','Backdoor Win','Surrender-Vote','Ace!','1v5 Clutch','Toxic Chat','Penta denied','Flash fail','Smurfs!','Game-breaking Bug'],
      6: ['Rage-Quit','10 Kill-Streak','Lag-Spike','GG EZ','AFK Spieler','Pentakill','No-Scope','Clutch-Play','Teamkill','Stream-Crash','Salty Chat','Griefer','Epic Fail','200 IQ Play','DC','Feeding','Backdoor Win','Surrender','Ace!','1v5 Clutch','Toxic Chat','Penta denied','Flash fail','Smurfs!','Bug','Wall hack?!','Speed hack','Enemy DC','Triple kill','Double kill','Noscope win','Last second save','Overtime','Lucky drop','MVP','Almost lost'],
    };
    const d = demos[gridSize] || demos[4];
    const mid = getMiddleIndex();
    let di = 0;
    for (let i = 0; i < gridSize * gridSize; i++) {
      if (freeMiddle && i === mid && gridSize % 2 !== 0) { cells[i] = 'FREE'; continue; }
      cells[i] = d[di % d.length];
      di++;
    }
    renderGrid();
    saveState();
  }

  function saveState() {
    const state = {
      gridSize,
      freeMiddle,
      cells,
      marked,
      title: document.getElementById('bingoTitle').value,
      theme: document.getElementById('colorTheme').value,
    };
    localStorage.setItem('bingo_state', JSON.stringify(state));
    updateObsUrl();
  }

  function updateObsUrl() {
    const url = window.location.href.replace('bingo-admin.html', 'bingo-overlay.html');
    document.getElementById('obsUrl').textContent = url;
  }

  function copyUrl() {
    const url = document.getElementById('obsUrl').textContent;
    navigator.clipboard.writeText(url).then(() => {
      const btn = event.target;
      btn.textContent = '✓ Kopiert!';
      setTimeout(() => btn.textContent = '📋 Kopieren', 2000);
    });
  }

  function openOverlay() {
    const url = window.location.href.replace('bingo-admin.html', 'bingo-overlay.html');
    window.open(url, '_blank');
  }

  // Init
  applySettings();
  updateObsUrl();
</script>
</body>
</html>
